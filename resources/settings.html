<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniChat Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f3460;
            color: #eee;
            padding: 32px;
        }
        h1 { font-size: 24px; margin-bottom: 24px; font-weight: 600; }
        .section { margin-bottom: 32px; }
        .section h2 {
            font-size: 16px; font-weight: 600; margin-bottom: 12px; color: #667eea;
        }
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: rgba(255,255,255,0.05);
            border-radius: 8px; margin-bottom: 8px;
        }
        .setting-label { font-size: 14px; }
        .toggle {
            width: 44px; height: 24px; background: rgba(255,255,255,0.15);
            border-radius: 12px; cursor: pointer; position: relative; transition: background 0.2s;
        }
        .toggle.on { background: #667eea; }
        .toggle::after {
            content: ''; width: 20px; height: 20px; background: white;
            border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: transform 0.2s;
        }
        .toggle.on::after { transform: translateX(20px); }
        .service-list { margin-top: 12px; }
        .service-row {
            display: flex; align-items: center; padding: 12px 16px;
            background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px;
        }
        .service-row .name { flex: 1; font-size: 14px; }
        .service-row .recipe { color: #888; font-size: 12px; margin-left: 8px; }
        .remove-btn {
            background: none; border: 1px solid rgba(231,76,60,0.5); color: #e74c3c;
            border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer;
        }
        .remove-btn:hover { background: rgba(231,76,60,0.2); }
    </style>
</head>
<body>
    <h1>Settings</h1>

    <div class="section">
        <h2>Services</h2>
        <div id="serviceList" class="service-list"></div>
    </div>

    <div class="section">
        <h2>General</h2>
        <div class="setting-row">
            <span class="setting-label">Show tray icon</span>
            <div class="toggle on" data-key="show_tray_icon"></div>
        </div>
        <div class="setting-row">
            <span class="setting-label">Minimize to tray</span>
            <div class="toggle" data-key="minimize_to_tray"></div>
        </div>
        <div class="setting-row">
            <span class="setting-label">Do Not Disturb</span>
            <div class="toggle" data-key="enable_dnd"></div>
        </div>
        <div class="setting-row">
            <span class="setting-label">Enable hibernation</span>
            <div class="toggle on" data-key="global_hibernation_enabled"></div>
        </div>
    </div>

    <script>
    (function() {
        function sendIPC(msg) {
            if (window.cefQuery) {
                window.cefQuery({
                    request: JSON.stringify(msg),
                    onSuccess: function() {},
                    onFailure: function() {},
                });
            }
        }

        document.querySelectorAll('.toggle').forEach(function(el) {
            el.addEventListener('click', function() {
                el.classList.toggle('on');
                sendIPC({
                    type: 'setting_change',
                    key: el.dataset.key,
                    value: el.classList.contains('on'),
                });
            });
        });

        window.__omnichat_settings = {
            updateServices: function(services) {
                var list = document.getElementById('serviceList');
                while (list.firstChild) {
                    list.removeChild(list.firstChild);
                }
                services.forEach(function(svc) {
                    var row = document.createElement('div');
                    row.className = 'service-row';

                    var nameSpan = document.createElement('span');
                    nameSpan.className = 'name';
                    nameSpan.textContent = svc.name;
                    row.appendChild(nameSpan);

                    var recipeSpan = document.createElement('span');
                    recipeSpan.className = 'recipe';
                    recipeSpan.textContent = svc.recipe_id;
                    row.appendChild(recipeSpan);

                    var removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-btn';
                    removeBtn.textContent = 'Remove';
                    removeBtn.addEventListener('click', function() {
                        if (confirm('Remove ' + svc.name + '?')) {
                            sendIPC({ type: 'remove_service', serviceId: svc.id });
                        }
                    });
                    row.appendChild(removeBtn);

                    list.appendChild(row);
                });
            },
        };
    })();
    </script>
</body>
</html>
